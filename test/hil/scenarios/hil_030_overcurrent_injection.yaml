name: "Overcurrent Fault Injection"
id: "HIL-030"
description: >
  Injects an overcurrent fault via MQTT and verifies that the system
  broadcasts a DTC and transitions to DEGRADED or SAFE_STOP state.
verifies:
  - "TSR-007"
  - "SSR-RZC-004"
asil: "B"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: true

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for CVC to reach RUN"

steps:
  - action: inject_mqtt
    topic: "taktflow/command/plant_inject"
    payload: '{"fault":"overcurrent","current_ma":28000}'
    description: "Inject overcurrent fault via MQTT"
  - action: wait
    seconds: 5
    description: "Wait for system to detect and react to overcurrent"

verdicts:
  - type: vehicle_state
    can_id: 0x100
    expected_state:
      - RUN
      - DEGRADED
      - SAFE_STOP
    timeout_ms: 5000
    description: "Vehicle state is RUN (HIL), DEGRADED, or SAFE_STOP within 5s"

teardown:
  - action: reset
    description: "Reset"

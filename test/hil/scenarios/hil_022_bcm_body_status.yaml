name: "BCM Body Status Timing"
id: "HIL-022"
description: >
  Verifies that the BCM broadcasts BCM_Heartbeat (0x360) at the
  specified 100ms period within acceptable tolerance.
verifies:
  - "SWR-BCM-010"
asil: "QM"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: false

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for CVC to reach RUN"

steps:
  - action: wait
    seconds: 3
    description: "Observe BCM_Heartbeat timing on the bus"

verdicts:
  - type: timing
    can_id: 0x016
    period_ms: 500
    tolerance_pct: 20
    description: "BCM_Heartbeat broadcast period is 100ms within 20% tolerance"

teardown:
  - action: reset
    description: "Reset"

name: "Brake Fault Injection"
id: "HIL-032"
description: >
  Injects a brake fault via MQTT and verifies that the system
  broadcasts the corresponding DTC and transitions to SAFE_STOP,
  as brake faults are ASIL D safety-critical.
verifies:
  - "TSR-016"
  - "SSR-FZC-007"
asil: "D"
aspice: "SWE.6"
iso_reference: "ISO 26262 Part 4, Section 7"
timeout_sec: 30
requires_mqtt: true

setup:
  - action: wait_state
    state: RUN
    timeout: 20
    description: "Wait for CVC to reach RUN"

steps:
  - action: inject_mqtt
    topic: "taktflow/command/plant_inject"
    payload: '{"fault":"brake_fault"}'
    description: "Inject brake fault via MQTT"
  - action: wait
    seconds: 5
    description: "Wait for system to detect and react to brake fault"

verdicts:
  - type: vehicle_state
    can_id: 0x100
    expected_state:
      - RUN
      - SAFE_STOP
    timeout_ms: 5000
    description: "Vehicle state is SAFE_STOP within 5s"

teardown:
  - action: reset
    description: "Reset"

#
# Public bench hardware-map template for the Taktflow Eclipse OpenSOVD work.
#
# The checked-in file must stay documentation-safe. Put real bench LAN
# addresses, usernames, probe serials, USB locations, and COM ports in
# tools/bench/hardware-map.local.toml (gitignored) or point
# TAKTFLOW_HARDWARE_MAP at a private map file.
#
# Tooling may still read this file directly, but bench automation will prefer
# the local override when it exists.

[host.windows]
name = "Windows dev machine"
role = "primary bench host"
notes = "Public template only. Keep real hostnames, usernames, and probe routing in the local override map."

# ----------------------------------------------------------------------
# ST-LINK probes (STM32 boards)
# ----------------------------------------------------------------------

[[stlink]]
logical_ecu = "cvc"
stlink_serial = "STLINK-CVC-PLACEHOLDER"
com_port = "COM-CVC"
usb_location = "USB-LOCATION-CVC"
assigned_on = "2026-04-15"
assigned_by = "public template"
flashed_image = "build/cvc-arm/cvc_firmware.elf"
target_mcu = "STM32G47x/G48x"
target_mcu_resolved_on = "2026-04-15"
notes = "Replace with the real CVC probe details in hardware-map.local.toml."

[[stlink]]
logical_ecu = "fzc"
stlink_serial = "STLINK-FZC-PLACEHOLDER"
com_port = "COM-FZC"
usb_location = "USB-LOCATION-FZC"
assigned_on = "2026-04-15"
assigned_by = "public template"
flashed_image = "build/fzc-arm/fzc_firmware.elf"
target_mcu = "STM32G47x/G48x"
target_mcu_resolved_on = "2026-04-15"
notes = "Replace with the real FZC probe details in hardware-map.local.toml."

[[stlink]]
logical_ecu = "rzc"
stlink_serial = "STLINK-RZC-PLACEHOLDER"
com_port = "COM-RZC"
usb_location = "USB-LOCATION-RZC"
assigned_on = "2026-04-15"
assigned_by = "public template"
target_mcu = "STM32G47x/G48x"
target_mcu_resolved_on = "2026-04-15"
flashed_image = "build/rzc-arm/rzc_firmware.elf"
notes = "Replace with the real RZC probe details in hardware-map.local.toml."

# ----------------------------------------------------------------------
# XDS110 probe (TI TMS570 / AURIX)
# ----------------------------------------------------------------------

[[xds110]]
logical_ecu = "tcu"
com_port_main = "COM-TCU-MAIN"
com_port_uart = "COM-TCU-UART"
assigned_on = "2026-04-15"
flashed_image = "none"
target_mcu = "TMS570 family (to be resolved via TI XDS110 probe info)"
notes = "Public template only. Replace with the real TCU probe routing in the local override map."

# ----------------------------------------------------------------------
# Other bench peripherals on the Windows host
# ----------------------------------------------------------------------

[[bench_peripheral]]
name = "USB-SERIAL CH340"
com_port = "COM-CH340"
role = "unknown / unassigned"
notes = "Generic USB-to-serial adapter. Not yet tied to a board. Identify before using."

# ----------------------------------------------------------------------
# Linux bench (Raspberry Pi)
# ----------------------------------------------------------------------

[host.pi]
name = "Raspberry Pi bench host"
ssh_target = "bench-pi@192.0.2.10"
role = "bench-resident services and real-CAN gateway"
notes = "Public template only. Keep the real bench LAN target in hardware-map.local.toml."

[pi.probes]
can_interface = "can0"
can_adapter = "OpenMoko Geschwister Schneider (GS_USB)"
stlink_attached = true
stlink_note = "One ST-LINK/V2.1 is physically connected to the Pi as well. Keep its real identity in the local override map."

[pi.scorehsm]
usb_vid_pid = "f055:4853"
vendor = "Taktflow-Systems"
product = "scoreHSM"
role = "Hardware Security Module reference implementation (separate repo at H:\\scorehsm)"


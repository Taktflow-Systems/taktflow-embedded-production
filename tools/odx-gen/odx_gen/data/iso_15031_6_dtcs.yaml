# ISO 15031-6 generic OBD-II DTC subset.
#
# This file holds a representative sample of the generic powertrain
# (P0xxx) DTC namespace defined by ISO 15031-6 / SAE J2012 and used by
# all emissions-compliant OBD-II vehicles.
#
# The exact set below is NOT exhaustive — it is a representative subset
# in the air/fuel/ignition/emissions range (P0100..P0199) used for test
# and reference PDX generation.
#
# Shape (each entry):
#   code:        textual DTC code (e.g. "P0101")
#   description: human-readable short description
#   category:    one of powertrain | body | chassis | network
#
# Source references (all public):
#   - ISO 15031-6:2015 "Road vehicles — Communication between vehicle
#     and external equipment for emissions-related diagnostics —
#     Part 6: Diagnostic trouble code definitions"
#   - SAE J2012 "Diagnostic Trouble Code Definitions"
#   - https://www.obd-codes.com (public OBD-II reference listing)

version: "1.0"
standard: "ISO 15031-6 / SAE J2012"

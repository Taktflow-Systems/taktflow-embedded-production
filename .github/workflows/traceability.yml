# =============================================================================
# Traceability Enforcement — GitHub Actions
#
# Auto-generates requirement traceability matrix and posts summary.
# ISO 26262 Part 8: Bidirectional traceability must be maintained.
# =============================================================================
name: Traceability

on:
  push:
    paths: ['docs/**', 'firmware/**', 'test/**', 'gateway/**', 'tools/trace/**']
  pull_request:
    paths: ['docs/**', 'firmware/**', 'test/**', 'gateway/**', 'tools/trace/**']

jobs:
  traceability:
    name: Traceability Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate traceability matrix
        run: python tools/trace/gen_traceability_matrix.py

      - name: Post summary to PR
        if: always()
        run: |
          echo "## Traceability Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          head -8 docs/safety/verification/traceability-matrix.md >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          IMPL_ONLY=$(grep -c "IMPL ONLY" docs/safety/verification/traceability-matrix.md || true)
          TRACED=$(grep -c "\*\*TRACED\*\*" docs/safety/verification/traceability-matrix.md || true)
          echo "| Status | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------:|" >> "$GITHUB_STEP_SUMMARY"
          echo "| TRACED | $TRACED |" >> "$GITHUB_STEP_SUMMARY"
          echo "| IMPL ONLY | $IMPL_ONLY |" >> "$GITHUB_STEP_SUMMARY"
          if [ "$IMPL_ONLY" -gt "0" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **WARNING:** $IMPL_ONLY requirements have implementation but no test" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: traceability-matrix
          path: docs/safety/verification/traceability-matrix.md
          retention-days: 90

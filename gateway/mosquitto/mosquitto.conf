# Mosquitto MQTT Broker — Taktflow SIL Demo
# Internal only (not exposed to internet). Caddy handles external TLS.

listener 1883 0.0.0.0
protocol mqtt

listener 9001 0.0.0.0
protocol websockets

# Authentication — all clients must provide credentials.
# Generate passwd file: mosquitto_passwd -b passwd <user> <password>
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

persistence false

log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
